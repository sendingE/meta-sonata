name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg --no-progress -y
          $ffmpeg = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg\tools" -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1
          $ffmpeg.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install meta-sonata
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q src tests
